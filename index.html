<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAPPY BIRTHDAY WIVESSY 💚</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffb6c1; /* Darker, warm pink background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Emojis Background */
        .emoji-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            font-size: 25px;
        }

        .floating {
            position: absolute;
            animation: move 10s linear infinite;
            opacity: 0.6;
        }

        @keyframes move {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        .main-heading {
            margin-top: 30px;
            font-size: 2.5rem;
            color: #ffffff; /* White text looks better on darker pink */
            font-weight: 900;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .green-heart { font-size: 3rem; display: block; }

        .play-btn {
            background-color: #ffffff;
            color: #ff3385;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            margin: 15px 0;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 1.2rem;
            z-index: 10;
        }

        .main-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 98%;
            max-width: 900px;
            margin: 20px 0;
            gap: 10px;
            z-index: 5;
        }

        .side-video {
            flex: 1;
            height: 420px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            flex: 2;
        }

        .photo-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid white;
        }

        .wish-container {
            padding: 25px;
            text-align: center;
            max-width: 85%;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.2); /* Glass effect */
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .sub-text {
            font-size: 1.8rem;
            color: #ffffff;
            font-weight: bold;
            line-height: 1.4;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            .main-layout { flex-direction: column; }
            .side-video { width: 100%; height: 300px; }
        }
    </style>
</head>
<body>

    <div class="emoji-bg">
        <div class="floating" style="left: 10%; animation-duration: 8s;">🐳</div>
        <div class="floating" style="left: 30%; animation-duration: 12s;">🦌</div>
        <div class="floating" style="left: 50%; animation-duration: 10s;">🌺</div>
        <div class="floating" style="left: 70%; animation-duration: 9s;">💚</div>
        <div class="floating" style="left: 90%; animation-duration: 11s;">🐳</div>
        <div class="floating" style="left: 20%; animation-duration: 14s;">🌺</div>
    </div>

    <div class="main-heading">
        HAPPY BIRTHDAY WIVESSY
        <span class="green-heart">💚</span>
    </div>

    <button class="play-btn" onclick="playMusic()">Surprise! Tap Here 🎵</button>

    <div class="main-layout">
        <video class="side-video" src="index/1video.mp4" autoplay muted loop playsinline></video>

        <div class="photo-grid">
            <img src="index/1photo.jpeg" alt="luv">
            <img src="index/2photo.jpeg" alt="luv">
            <img src="index/3photo.png" alt="luv">
            <img src="index/4photo.png" alt="luv">
        </div>

        <video id="soundVideo" class="side-video" src="index/2video.mp4" loop playsinline></video>
    </div>

    <div class="wish-container">
        <div class="sub-text">
            Happy Birthday wivessy luv u always and won't leave you and hope you stay by my side just the same and call you my wife Have the best birthday ever ! 💚😊💫🌺
        </div>
    </div>

    <script>
        function playMusic() {
            var vid = document.getElementById("soundVideo");
            vid.play();
            document.querySelector('.play-btn').style.display = 'none';
        }
    </script>

</body>
</html>
